<body>
  
  <div class='info'>
    <a><strong>Bekle!</strong> Müziğin süresi bitti, tekrar başlatmak için tekrar butona tıkla.</a>

  <div class='semoizm-outer'>
    <div class="semoizm-header">
      <img class="header-icon" src="./public/semoizmgif.gif" alt="logo">
      <div class="header-items">
        <a class="header-items-white" href="/index.html">Anasayfa 🚀</a>
        <a class="header-items-white" href="/">Projeler 📂</a>
      </div>

    </div>
    
    <div class="container">
    <h1 style="text-align: center; color: white;">Projelerim 📂</h1>
    <div class="projects-grid" id="projects-grid">
        </div>
</div>

    <script src="./public/projeler.js"></script>

  <audio id="bg-music" loop>
  <source src="./public/semoizm.mp3" type="audio/mpeg">
</audio>

<button id="mute-btn" class="isolated-btn">
  🔇
</button>

<style>
  #mute-btn.isolated-btn {
  
    position: fixed !important;
    bottom: 20px !important;
    right: 20px !important;
    z-index: 999999 !important;
    
    
    display: flex !important;           
    align-items: center !important;     
    justify-content: center !important; 
    gap: 8px !important;                
    
   
    padding: 10px 20px !important;
    height: 45px !important;
    background: rgba(0, 0, 0, 0.6) !important;
    color: white !important;
    border-radius: 8px !important;
    font-family: sans-serif !important;
    
  
    border: 2px solid transparent !important;
    box-sizing: border-box !important;
    margin: 0 !important;
    transform: none !important;
    transition: all 0.3s ease !important;
    outline: none !important;
  }

  #mute-btn.isolated-btn:hover {
    box-shadow: 0 0 15px 2px rgba(255, 255, 255, 0.7) !important;
    border: 2px solid rgba(255, 255, 255, 0.5) !important;
    transform: none !important;
  }
</style>

<script>
  const audio = document.getElementById("bg-music");
  const muteBtn = document.getElementById("mute-btn");

  audio.volume = 0.1;

  muteBtn.addEventListener('click', function() {
    if (audio.paused) {
      audio.play();
      muteBtn.textContent = "🔊";
    } else if (audio.muted) {
      audio.muted = false;
      muteBtn.textContent = "🔊";
    } else {
      audio.muted = true;
      muteBtn.textContent = "🔇";
    }
  });

  document.addEventListener('click', function() {
    if (audio.paused) {
      audio.play();
      muteBtn.textContent = "🔊";
    }
  }, { once: true });
</script>

                <footer>Bana <a class='link' target='_blank' href='https://instagram.com/Semoizm'>instagram'dan</a> ulaşabilirsin.</footer>
        </div>
    </div>
  </div>
  
  <script type='text/javascript' src="./public/index.js"></script>
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js' integrity='sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p' crossorigin='anonymous'></script>
